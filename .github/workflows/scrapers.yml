name: Daily Price Scraper

on:
  schedule:
    - cron: '0 1 * * *'  # runs every day at 9AM Manila time (UTC+8)
  workflow_dispatch:       # allows manual trigger from GitHub

jobs:
  scrape:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm install
        working-directory: ./scraper

      - name: Run DOE scraper
        working-directory: ./scraper
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
        run: node doe-scraper.js

      - name: Run PSA Excel scraper
        working-directory: ./scraper
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
        run: node psa-excel-scraper.js

      - name: Log completion
        run: echo "✅ Scrapers completed at $(date)"